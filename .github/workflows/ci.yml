name: CI

on:
  pull_request:
  workflow_call:
    inputs:
      run-security:
        type: boolean
        default: true
      run-release:
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    uses: vergil-project/vergil-actions/.github/workflows/ci-audit.yml@v2.1
    with:
      language: python
      versions: '["3.12", "3.13", "3.14"]'
      container-tag: '3.14'
      container-suffix: python

  quality:
    uses: vergil-project/vergil-actions/.github/workflows/ci-quality.yml@v2.1
    with:
      language: python
      versions: '["3.12", "3.13", "3.14"]'
      container-tag: '3.14'
      container-suffix: python

  security:
    uses: vergil-project/vergil-actions/.github/workflows/ci-security.yml@v2.1
    permissions:
      contents: read
      security-events: write
      # Requested by ci-security.yml@v2.1.3: codeql-action/upload-sarif
      # needs it on private repos. See vergil-project/vergil-actions#698.
      actions: read
    with:
      language: python
      run-security: ${{ inputs.run-security != 'false' }}
      container-tag: '3.14'
      container-suffix: python

  test:
    uses: vergil-project/vergil-actions/.github/workflows/ci-test.yml@v2.1
    with:
      language: python
      versions: '["3.12", "3.13", "3.14"]'
      container-tag: '3.14'
      container-suffix: python

  version:
    uses: vergil-project/vergil-actions/.github/workflows/ci-version-bump.yml@v2.1
    with:
      language: python
      run-release: ${{ inputs.run-release != 'false' }}
      container-tag: '3.14'
      container-suffix: python

  docs:
    uses: vergil-project/vergil-actions/.github/workflows/ci-docs.yml@v2.1
