[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "standard-tooling"
version = "1.4.29"
description = "Shared development tooling for managed repositories"
requires-python = ">=3.12,<4.0"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
dependencies = []

[project.scripts]
st-check-pr-merge = "standard_tooling.bin.st_check_pr_merge:main"
st-commit = "standard_tooling.bin.st_commit:main"
st-docker-cache = "standard_tooling.bin.st_docker_cache:main"
st-docker-docs = "standard_tooling.bin.st_docker_docs:main"
st-docker-run = "standard_tooling.bin.st_docker_run:main"
st-docker-test = "standard_tooling.bin.st_docker_test:main"
st-ensure-label = "standard_tooling.bin.st_ensure_label:main"
st-finalize-repo = "standard_tooling.bin.st_finalize_repo:main"
st-generate-commands = "standard_tooling.bin.st_generate_commands:main"
st-github-config = "standard_tooling.bin.st_github_config:main"
st-merge-when-green = "standard_tooling.bin.st_merge_when_green:main"
st-pr-issue-linkage = "standard_tooling.bin.st_pr_issue_linkage:main"
st-prepare-release = "standard_tooling.bin.st_prepare_release:main"
st-repo-profile = "standard_tooling.bin.st_repo_profile:main"
st-submit-pr = "standard_tooling.bin.st_submit_pr:main"
st-validate = "standard_tooling.bin.st_validate:main"
st-version = "standard_tooling.bin.st_version:main"
st-wait-until-green = "standard_tooling.bin.st_wait_until_green:main"

[dependency-groups]
dev = ["ruff", "mypy", "ty", "pytest", "pytest-cov", "pip-audit", "pip-licenses"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.package-data]
standard_tooling = ["data/*.json", "configs/*.yaml", "configs/*.toml", "configs/ruby/*.yml"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "SIM", "TCH", "ARG", "PTH", "ERA"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "ARG"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.report]
exclude_lines = [
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
    "pragma: no cover",
]
