site_name: VERGIL Tooling
site_description: Shared development tooling for git hooks, validation, and automation
repo_url: https://github.com/vergil-project/vergil-tooling
repo_name: vergil-project/vergil-tooling

docs_dir: docs
strict: true
edit_uri: ""

extra:
  version:
    provider: mike

plugins:
  - search

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Releases:
      - Changelog: changelog.md
      - Release Notes:
          - releases/index.md
  - Getting Started: getting-started.md
  - Script Reference:
      - Overview: reference/index.md
      - CLI Tools Overview: reference/cli-tools-overview.md
      - Git Hooks:
          - pre-commit: reference/hooks/pre-commit.md
      - Validators:
          - repo-profile: reference/lint/repo-profile.md
          - markdown-validation: reference/lint/markdown-standards.md
          - pr-issue-linkage: reference/lint/pr-issue-linkage.md
      - CLI Tools:
          - st-commit: reference/dev/commit.md
          - st-submit-pr: reference/dev/submit-pr.md
          - st-prepare-release: reference/dev/prepare-release.md
          - st-finalize-repo: reference/dev/finalize-repo.md
  - Standards:
      - Authoring:
          - Markdown Authoring: standards/markdown-authoring.md
          - Architecture: standards/architecture.md
      - Repository:
          - Repository Structure: standards/repository-structure.md
          - Dependency Anchor Records: standards/dependency-anchor-records.md
      - Source Control:
          - Source Control Guidelines: standards/source-control-guidelines.md
          - GitHub Issues: standards/github-issues.md
          - Application Branching: standards/branching-application.md
          - Documentation Branching: standards/branching-documentation.md
          - Hotfix Policy: standards/hotfix-policy.md
          - Application Versioning: standards/versioning-application.md
      - Development:
